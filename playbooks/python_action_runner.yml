---
- name: Run Python action demo through Controller
  hosts: all
  gather_facts: false
  vars:
    project_root: "{{ playbook_dir | dirname }}"
  tasks:
    - name: Execute Python action script
      ansible.builtin.command:
        argv:
          - python3
          - scripts/python_action_demo.py
          - --event-id
          - "{{ event_id | default('') }}"
          - --host
          - "{{ host | default('') }}"
          - --severity
          - "{{ severity | default('') }}"
          - --message
          - "{{ message | default('') }}"
          - --sent-at
          - "{{ sent_at | default('') }}"
          - --source
          - "{{ source | default('') }}"
          - --event-type
          - "{{ event_type | default('') }}"
          - --sequence
          - "{{ sequence | default('') }}"
      args:
        chdir: "{{ project_root }}"
      register: python_action_result
      changed_when: false

    - name: Show Python action output
      ansible.builtin.debug:
        var: python_action_result.stdout
